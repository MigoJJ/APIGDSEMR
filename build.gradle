plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'key.emr.ittia'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'org.xerial:sqlite-jdbc:3.51.1.0'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-core:5.12.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.12.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

javafx {
    version = "25.0.1"
    modules = [ 'javafx.controls' ]
}

application {
    mainClass = 'key.emr.ittia.GeminiApp'
}

run {
    jvmArgs = ['--enable-native-access=javafx.graphics', '--enable-native-access=ALL-UNNAMED']
}

tasks.register('healthCheck', JavaExec) {
    group = 'verification'
    description = 'Checks Gemini or OpenAI API connectivity. Set -Pprovider=gemini|openai|all.'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'key.emr.ittia.GeminiHealthCheck'
    if (project.hasProperty('provider')) {
        args project.property('provider').toString()
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = '25'
    targetCompatibility = '25'
}

test {
    useJUnitPlatform()
}
